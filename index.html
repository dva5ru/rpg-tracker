<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Tracker - Mobile TWA</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --panel-gray: #1e1e1e;
            --border-gray: #333333;
            --accent-yellow: #d4af37;
            --accent-green: #1b5e20;
            --text-main: #d1d1d1;
            --hp-red: #8b0000;
        }

        /* Адаптация под телефон: убираем скролл, запрещаем выделение текста */
        * { box-sizing: border-box; user-select: none; }
        
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            font-size: 8px; 
            line-height: 1.4;
        }

        .box {
            background: var(--panel-gray);
            border: 1px solid var(--border-gray);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        h2 { color: var(--accent-yellow); font-size: 10px; text-align: center; margin-top: 0; margin-bottom: 15px; border-bottom: 1px dashed #333; padding-bottom: 5px;}

        /* --- ТОП ПАНЕЛЬ --- */
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 10px; color: var(--accent-yellow); font-size: 9px; }

        /* --- СЕТКА ЭКИПИРОВКИ И ПЕРСОНАЖ --- */
        .equipment-grid {
            display: grid;
            grid-template-columns: 40px 1fr 40px; /* Левая колонка, центр (герой), правая колонка */
            gap: 10px;
            align-items: center;
            justify-items: center;
            margin-bottom: 15px;
        }

        .col-slots { display: flex; flex-direction: column; gap: 8px; }
        
        .slot {
            width: 35px; height: 35px;
            background: #111;
            border: 1px dashed var(--border-gray);
            display: flex; justify-content: center; align-items: center;
            font-size: 16px;
            color: #555;
            position: relative;
        }
        .slot-name { position: absolute; bottom: -8px; font-size: 5px; color: #777; width: 100%; text-align: center; }

        @keyframes idleBreathe { 0% { transform: translateY(0px); } 50% { transform: translateY(-4px); } 100% { transform: translateY(0px); } }
        .character-sprite { font-size: 70px; animation: idleBreathe 2s infinite ease-in-out; }

        /* --- ПОЛОСКИ HP и XP --- */
        .bar-container { background: #000; border: 1px solid var(--border-gray); height: 10px; margin: 3px 0 10px 0; border-radius: 3px; overflow: hidden;}
        .hp-bar { background: var(--hp-red); height: 100%; width: 100%; }
        .xp-bar { background: var(--accent-green); height: 100%; width: 25%; }

        /* --- СТАТЫ (8 штук) --- */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .stat-item { background: #111; border: 1px solid var(--border-gray); padding: 6px; font-size: 7px; display: flex; justify-content: space-between; border-radius: 3px;}
        .stat-value { color: var(--accent-yellow); }

        /* --- КНОПКИ МЕНЮ --- */
        .menu-buttons { display: flex; gap: 5px; margin-bottom: 15px; }
        .btn-menu { flex: 1; background: #111; color: var(--text-main); border: 1px solid var(--border-gray); padding: 10px 0; text-align: center; font-size: 7px; border-radius: 4px; }
        .btn-menu:active { background: var(--accent-yellow); color: #000; }

        /* --- ВСПЛЫВАЮЩИЕ ОКНА --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: var(--panel-gray); border: 1px solid var(--border-gray); border-radius: 6px;
            width: 90%; max-height: 80%; overflow-y: auto; padding: 15px; position: relative;
        }
        .close-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--text-main); font-size: 16px; cursor: pointer; }
        .inventory-item { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 10px; margin-bottom: 8px; border: 1px solid var(--border-gray); border-radius: 4px; }

        /* --- КВЕСТЫ (Гармошка / Details) --- */
        details { background: #111; border: 1px solid var(--border-gray); border-radius: 4px; margin-bottom: 8px; }
        summary { padding: 10px; font-size: 8px; color: var(--accent-yellow); cursor: pointer; outline: none; list-style: none; display: flex; justify-content: space-between;}
        summary::after { content: '▼'; color: #555;}
        details[open] summary::after { content: '▲'; }
        
        .task-list { padding: 0 10px 10px 10px; }
        .task { border-bottom: 1px solid #222; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .task:last-child { border-bottom: none; }
        .task-info { max-width: 65%; }
        .task-title { font-size: 7px; margin-bottom: 4px; line-height: 1.3;}
        .task-reward { color: var(--accent-green); font-size: 6px; }
        .btn-action { background: var(--accent-green); color: white; border: none; padding: 6px 8px; font-size: 6px; border-radius: 3px; font-family: 'Press Start 2P', cursive; }

    </style>
</head>
<body>

    <div class="top-bar">
        <div>LVL: <span id="level">12</span></div>
        <div>ЗОЛОТО: <span id="gold">450</span></div>
    </div>

    <div class="box">
<div class="equipment-grid">
            <div class="col-slots">
                <div class="slot" id="slot-amulet"><div class="slot-name">Амулет</div></div>
                <div class="slot" id="slot-right-hand"><div class="slot-name">Правая рука</div></div>
                <div class="slot" id="slot-ring-1"><div class="slot-name">Кольцо 1</div></div>
                <div class="slot" id="slot-bracelet"><div class="slot-name">Браслет</div></div>
            </div>

            <div class="col-slots" style="gap: 2px;">
                <div class="slot" id="slot-head" style="margin-bottom: 5px;"><div class="slot-name">Голова</div></div>
                <div class="character-sprite" id="hero-sprite" style="font-size: 10px; display: flex; align-items: center; justify-content: center; border: 1px dashed #555; width: 60px; height: 60px;">ГЕРОЙ</div>
                <div class="slot" id="slot-legs" style="margin-top: 5px;"><div class="slot-name">Штаны</div></div>
                <div class="slot" id="slot-shoes" style="margin-top: 8px;"><div class="slot-name">Обувь</div></div>
            </div>

            <div class="col-slots">
                <div class="slot" id="slot-cape"><div class="slot-name">Накидка</div></div>
                <div class="slot" id="slot-armor"><div class="slot-name">Броня</div></div>
                <div class="slot" id="slot-left-hand"><div class="slot-name">Левая рука</div></div>
                <div class="slot" id="slot-ring-2"><div class="slot-name">Кольцо 2</div></div>
            </div>
        </div>
        </div>

        <div style="font-size: 7px;">HP: 100/100</div>
        <div class="bar-container"><div class="hp-bar"></div></div>

        <div style="font-size: 7px;">XP: 250/1000</div>
        <div class="bar-container"><div class="xp-bar"></div></div>

<div class="stats-grid">
            <div class="stat-item">Сила <span class="stat-value" id="stat-Сила">10</span></div>
            <div class="stat-item">Ловкость <span class="stat-value" id="stat-Ловкость">10</span></div>
            <div class="stat-item">Выносливость <span class="stat-value" id="stat-Выносливость">10</span></div>
            <div class="stat-item">Интеллект <span class="stat-value" id="stat-Интеллект">10</span></div>
            <div class="stat-item">Сила духа <span class="stat-value" id="stat-Сила духа">10</span></div>
            <div class="stat-item">Гибкость <span class="stat-value" id="stat-Гибкость">10</span></div>
            <div class="stat-item">Концентрация <span class="stat-value" id="stat-Концентрация">10</span></div>
            <div class="stat-item">Креативность <span class="stat-value" id="stat-Креативность">10</span></div>
        </div>
    </div>

    <div class="menu-buttons">
        <div class="btn-menu" onclick="openInventory()">ИНВЕНТАРЬ</div>
        <div class="btn-menu">МЕТРИКИ</div>
        <div class="btn-menu">ТАЛАНТЫ</div>
    </div>

    <div class="box" style="padding: 10px 5px;">
        
        <div class="box" style="padding: 10px 5px;">
        <h2>КВЕСТЫ</h2>
        <div id="quests-container"></div>
    </div>
        
      <div id="modal-inventory" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeInventory()">✖</button>
            <h2 style="margin-top: 10px;">РЮКЗАК</h2>
            <div id="inventory-list"></div>
        </div>
    </div>  
        
    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();   // Сообщаем телеграму, что приложение готово
        tg.expand();  // Растягиваем на весь экран

        // База данных всех квестов
        const questsDatabase = [
            // Ежедневные
            { id: "d1", type: "daily", title: "Шаги (10к)", xp: 10, gold: 2, stat: "Выносливость" },
            { id: "d2", type: "daily", title: "Вода", xp: 5, gold: 1, stat: "Выносливость" },
            { id: "d3", type: "daily", title: "Питание", xp: 10, gold: 2, stat: "Сила духа" },
            { id: "d4", type: "daily", title: "Дефицит", xp: 15, gold: 3, stat: "Концентрация" },
            { id: "d5", type: "daily", title: "Белок", xp: 10, gold: 2, stat: "Сила" },
            { id: "d6", type: "daily", title: "Витамины", xp: 5, gold: 1, stat: "Выносливость" },
            { id: "d7", type: "daily", title: "Чтение", xp: 10, gold: 2, stat: "Интеллект" },
            { id: "d8", type: "daily", title: "Зубы (утро/вечер)", xp: 5, gold: 1, stat: "Гибкость" },
            { id: "d9", type: "daily", title: "Умывание (утро/вечер)", xp: 5, gold: 1, stat: "Креативность" },
            { id: "d10", type: "daily", title: "Душ (утро/вечер)", xp: 10, gold: 2, stat: "Сила духа" },
            { id: "d11", type: "daily", title: "Отжимания (50х)", xp: 15, gold: 3, stat: "Сила" },
            { id: "d12", type: "daily", title: "Пресс (100х)", xp: 15, gold: 3, stat: "Сила" },
            { id: "d13", type: "daily", title: "Планка (2 мин)", xp: 10, gold: 2, stat: "Сила духа" },
            { id: "d14", type: "daily", title: "Сон (8ч)", xp: 15, gold: 3, stat: "Концентрация" },
            { id: "d15", type: "daily", title: "Растяжка (5 мин)", xp: 10, gold: 2, stat: "Гибкость" },

            // Еженедельные
            { id: "w1", type: "weekly", title: "Взвешивание", xp: 20, gold: 5, stat: "Концентрация" },
            { id: "w2", type: "weekly", title: "Волейбол (Тренировка 1)", xp: 50, gold: 15, stat: "Ловкость" },
            { id: "w3", type: "weekly", title: "Волейбол (Тренировка 2)", xp: 50, gold: 15, stat: "Ловкость" },
            { id: "w4", type: "weekly", title: "Зал (Силовая 1)", xp: 60, gold: 20, stat: "Сила" },
            { id: "w5", type: "weekly", title: "Зал (Силовая 2)", xp: 60, gold: 20, stat: "Сила" },
            { id: "w6", type: "weekly", title: "Бассейн (Заплыв 1)", xp: 40, gold: 10, stat: "Выносливость" },
            { id: "w7", type: "weekly", title: "Бассейн (Заплыв 2)", xp: 40, gold: 10, stat: "Выносливость" },
            { id: "w8", type: "weekly", title: "Скакалка (15 мин)", xp: 30, gold: 10, stat: "Ловкость" },
            { id: "w9", type: "weekly", title: "Пробежка (Лёгкая)", xp: 40, gold: 15, stat: "Выносливость" },
            { id: "w10", type: "weekly", title: "Массаж (МФР валик)", xp: 30, gold: 10, stat: "Гибкость" },

            // Ежемесячные
            { id: "m1", type: "monthly", title: "Пробежка (5 км)", xp: 100, gold: 30, stat: "Выносливость" },
            { id: "m2", type: "monthly", title: "Турнир (Волейбол)", xp: 150, gold: 50, stat: "Ловкость" },
            { id: "m3", type: "monthly", title: "Проходка (Макс. вес)", xp: 100, gold: 30, stat: "Сила" },
            { id: "m4", type: "monthly", title: "Замеры (Объемы тела)", xp: 50, gold: 15, stat: "Концентрация" },
            { id: "m5", type: "monthly", title: "Прыжок (Замер высоты)", xp: 80, gold: 25, stat: "Ловкость" },
            { id: "m6", type: "monthly", title: "Челлендж (Без сахара)", xp: 100, gold: 30, stat: "Сила духа" }
        ];
// База всех предметов в игре
        const itemsDatabase = {
            "sword_1": { name: "Ржавый меч", type: "Правая рука", stat: "Сила", bonus: 1, img: "sword_1.png", price: 10 },
            "shoes_1": { name: "Старые кроссовки", type: "Обувь", stat: "Выносливость", bonus: 2, img: "shoes_1.png", price: 15 }
        };

        // Рюкзак игрока (сохраняется в памяти)
        let playerInventory = JSON.parse(localStorage.getItem('rpg_inventory')) || ["sword_1", "shoes_1"];
// 1. СИСТЕМА СОХРАНЕНИЙ И УРОВНЕЙ
        let currentGold = parseInt(localStorage.getItem('rpg_gold')) || 0;
        let currentXp = parseInt(localStorage.getItem('rpg_xp')) || 0;
        let currentLevel = parseInt(localStorage.getItem('rpg_level')) || 1;
        let maxXp = 1000; // Опыт до следующего уровня

        // Базовые статы героя (начинаем с 10)
        let playerStats = JSON.parse(localStorage.getItem('rpg_stats')) || {
            "Сила": 10, "Ловкость": 10, "Выносливость": 10, "Интеллект": 10,
            "Сила духа": 10, "Гибкость": 10, "Концентрация": 10, "Креативность": 10
        };

        // 2. ДАТА И СБРОС КВЕСТОВ
        let completedQuests = JSON.parse(localStorage.getItem('rpg_completed')) || [];
        const today = new Date().toISOString().split('T')[0];
        let lastLoginDate = localStorage.getItem('rpg_last_login');

        if (lastLoginDate !== today) {
            completedQuests = []; 
            localStorage.setItem('rpg_last_login', today);
            localStorage.setItem('rpg_completed', JSON.stringify(completedQuests));
        }

        // Обновляем интерфейс при старте
        document.getElementById('gold').innerText = currentGold;
        document.getElementById('level').innerText = currentLevel;
        document.querySelector('.xp-bar').style.width = Math.min((currentXp / maxXp) * 100, 100) + '%';
        
        // Загружаем сохраненные статы на экран
        for (let stat in playerStats) {
            let statElement = document.getElementById('stat-' + stat);
            if (statElement) statElement.innerText = playerStats[stat];
        }

        // 3. Функция: Вывести квесты
        function renderQuests() {
            const container = document.getElementById('quests-container');
            container.innerHTML = ''; 

            questsDatabase.forEach(quest => {
                // Если квест выполнен — ПРОПУСКАЕМ ЕГО (он исчезает из списка)
                if (completedQuests.includes(quest.id)) return; 
                
                const taskDiv = document.createElement('div');
                taskDiv.className = 'task';
                
                taskDiv.innerHTML = `
                    <div class="task-info">
                        <div class="task-title">${quest.title}</div>
                        <div class="task-reward">+1 ${quest.stat} | ${quest.gold}💰 | ${quest.xp} XP</div>
                    </div>
                    <button class="btn-action" onclick="completeQuest('${quest.id}', ${quest.xp}, ${quest.gold}, '${quest.stat}')">СДЕЛАТЬ</button>
                `;
                container.appendChild(taskDiv);
            });
        }

        // 4. Функция: Выполнение квеста
        function completeQuest(questId, xpReward, goldReward, statName) {
            // Прибавляем ресурсы
            currentGold += goldReward;
            currentXp += xpReward;
            
            // Качаем конкретный стат (+1)
            if (playerStats[statName] !== undefined) {
                playerStats[statName] += 1;
            }

            // Механика повышения уровня (когда XP больше 1000)
            if (currentXp >= maxXp) {
                currentLevel++;
                currentXp -= maxXp; // Остаток опыта переходит на новый уровень
                localStorage.setItem('rpg_level', currentLevel);
                document.getElementById('level').innerText = currentLevel;
                
                // Уведомление о новом уровне
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.showAlert(`УРОВЕНЬ ПОВЫШЕН! Теперь ты ${currentLevel} уровня.`);
                } else {
                    alert(`УРОВЕНЬ ПОВЫШЕН! Теперь ты ${currentLevel} уровня.`);
                }
            }

            // Сохраняем всё в память
            completedQuests.push(questId);
            localStorage.setItem('rpg_completed', JSON.stringify(completedQuests));
            localStorage.setItem('rpg_gold', currentGold);
            localStorage.setItem('rpg_xp', currentXp);
            localStorage.setItem('rpg_stats', JSON.stringify(playerStats));

            // Обновляем полоску опыта, золото и цифру стата на экране
            document.getElementById('gold').innerText = currentGold;
            document.querySelector('.xp-bar').style.width = Math.min((currentXp / maxXp) * 100, 100) + '%';
            if (document.getElementById('stat-' + statName)) {
                document.getElementById('stat-' + statName).innerText = playerStats[statName];
            }

            // Вибрация
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }

            // Перерисовываем список квестов (чтобы нажатый квест мгновенно исчез)
            renderQuests();
        }

        // Запускаем отрисовку
        renderQuests();
// 5. ЛОГИКА ИНВЕНТАРЯ
        function openInventory() {
            const modal = document.getElementById('modal-inventory');
            const list = document.getElementById('inventory-list');
            list.innerHTML = ''; // Очищаем старый список

            if (playerInventory.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #777; font-size: 8px;">Рюкзак пуст</div>';
            } else {
                // Перебираем вещи в рюкзаке
                playerInventory.forEach(itemId => {
                    const item = itemsDatabase[itemId];
                    if (item) {
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'inventory-item';
                        itemDiv.innerHTML = `
                            <div>
                                <div style="font-size: 8px; color: var(--accent-yellow);">${item.name}</div>
                                <div style="font-size: 6px; color: #777; margin-top: 4px;">Слот: ${item.type} | +${item.bonus} ${item.stat}</div>
                            </div>
                            <button class="btn-action" style="font-size: 6px; padding: 5px;" onclick="alert('Функция надевания будет в следующем шаге')">НАДЕТЬ</button>
                        `;
                        list.appendChild(itemDiv);
                    }
                });
            }
            modal.style.display = 'flex'; // Показываем окно
        }

        function closeInventory() {
            document.getElementById('modal-inventory').style.display = 'none'; // Скрываем окно
        }
        
    </script>
</body>
</html>
